<div class="trade-container">

<div class="trade-side">

<h2>{{actorA.name}}</h2>

<div class="inventory">

{{#each itemsA}}
<div class="item" data-id="{{id}}" data-side="A">

<img src="{{img}}" class="trade-icon">

<div class="trade-item-info">

<div class="trade-name">
{{name}}
</div>

<div class="trade-meta">
Qty: {{quantity}} • Value: {{price}} gp
</div>

</div>

</div>
  
{{/each}}

</div>

Gold:  
<input class="gold-a" type="number" value="{{goldA}}" min="0">

<button class="accept-a">Accept</button>

</div>


<div class="trade-side">

<h2>{{actorB.name}}</h2>

<div class="inventory">

{{#each itemsB}}
<div class="item" data-id="{{id}}" data-side="B">

<img src="{{img}}" class="trade-icon">

<div class="trade-item-info">

<div class="trade-name">
{{name}}
</div>

<div class="trade-meta">
Qty: {{quantity}} • Value: {{price}} gp
</div>

</div>

</div>
{{/each}}

</div>

Gold:  
<input class="gold-b" type="number" value="{{goldB}}" min="0">

<button class="accept-b">Accept</button>

</div>

<div class="trade-controls">
<button class="cancel">Cancel</button>
</div>

</div>
